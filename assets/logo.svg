<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 435 90" width="100%" height="100%">
    <!-- Logo Content Wrapper with Skew for perfect italic effect matching the original -->
    <g transform="skewX(-11) translate(34, 0)">
        
        <!-- Left Speed Lines & Arrow -->
        <g id="left-icon" transform="translate(0, 13)" fill="#00CFBD" stroke="#00CFBD" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
            <!-- Top Line: Dot + Line -->
            <circle cx="5" cy="20" r="2.5" stroke="none" />
            <line x1="13" y1="20" x2="25" y2="20" />
            
            <!-- Middle Line: Dot + Line -->
            <circle cx="0" cy="32" r="2.5" stroke="none" />
            <line x1="8" y1="32" x2="30" y2="32" stroke-width="5.5" />
            
            <!-- Bottom Line: Dot + Line -->
            <circle cx="5" cy="44" r="2.5" stroke="none" />
            <line x1="13" y1="44" x2="25" y2="44" />
            
            <!-- Arrow Head -->
            <path d="M 36 22 L 50 32 L 36 42 Z" stroke="none" />
        </g>
        
        <!-- Text: PronttoGo -->
        <text x="58" y="66" font-family="-apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5">
            <tspan fill="currentColor" class="text-[#2A3543] dark:text-white">Prontto</tspan><tspan fill="#00CFBD">Go</tspan>
        </text>

        <!-- Right Shopping Cart with Arrow -->
        <g id="right-icon" transform="translate(298, 7)">
            <!-- Basket Body (Solid Cyan) -->
            <path d="M 16 24 H 28 L 38 52 H 76 L 86 24 H 32 Z" fill="#00CFBD" />
            
            <!-- Handle (Cyan line) -->
            <line x1="28" y1="24" x2="18" y2="10" stroke="#00CFBD" stroke-width="5.5" stroke-linecap="round" />
            
            <!-- Wheels (Cyan circles) -->
            <circle cx="46" cy="62" r="6" fill="#00CFBD" />
            <circle cx="68" cy="62" r="6" fill="#00CFBD" />
            
            <!-- Speed Arrow Inside Cart (White Cutout) -->
            <g stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
                <!-- Top Speed Line -->
                <line x1="48" y1="32" x2="60" y2="32" stroke-width="3" />
                <!-- Middle Speed Line -->
                <line x1="44" y1="38" x2="64" y2="38" stroke-width="4" />
                <!-- Bottom Speed Line -->
                <line x1="48" y1="44" x2="60" y2="44" stroke-width="3" />
                <!-- Arrow Head (Solid White) -->
                <path d="M 65 32 L 73 38 L 65 44 Z" fill="#FFFFFF" stroke="none" />
            </g>
        </g>
    </g>
</svg>
